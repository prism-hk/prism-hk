<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" width="1200" height="1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B68EE"/>
      <stop offset="50%" stop-color="#9B7FFF"/>
      <stop offset="100%" stop-color="#E879F9"/>
    </linearGradient>
    <linearGradient id="prism-left" x1="0.5" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5EEDB8"/>
      <stop offset="60%" stop-color="#7CE88E"/>
      <stop offset="100%" stop-color="#F5D55A"/>
    </linearGradient>
    <linearGradient id="prism-right" x1="0.3" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C55A"/>
      <stop offset="50%" stop-color="#F07090"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="prism-base" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D4B0E8"/>
      <stop offset="100%" stop-color="#F0B0A0"/>
    </linearGradient>
    <radialGradient id="shadow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(0,0,0,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <!-- Background — purple gradient -->
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <!-- Subtle depth circles -->
  <circle cx="200" cy="400" r="300" fill="rgba(255,255,255,0.03)"/>
  <circle cx="1000" cy="800" r="350" fill="rgba(0,0,0,0.04)"/>

  <!-- === CROP ZONE: y=285 to y=915 (630px) === -->

  <!-- Prism icon -->
  <g transform="translate(600, 420)">
    <ellipse cx="0" cy="90" rx="65" ry="15" fill="url(#shadow)"/>
    <polygon points="0,-85 -72,72 0,30" fill="url(#prism-left)"/>
    <polygon points="0,-85 72,72 0,30" fill="url(#prism-right)"/>
    <polygon points="-72,72 72,72 0,82" fill="url(#prism-base)" opacity="0.45"/>
  </g>

  <!-- PRISM wordmark -->
  <text x="600" y="570" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="48" font-weight="400" letter-spacing="18" fill="rgba(255,255,255,0.9)">P R I S M</text>

  <!-- Tagline -->
  <text x="600" y="660" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="68" font-weight="700" fill="white">Find your wavelength.</text>

  <!-- Subtitle English -->
  <text x="600" y="730" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="30" font-weight="400" fill="rgba(255,255,255,0.8)">Hong Kong's LGBTQ+ Directory</text>

  <!-- Subtitle Chinese -->
  <text x="600" y="775" text-anchor="middle" font-family="'PingFang HK', 'Noto Sans TC', sans-serif" font-size="28" font-weight="400" fill="rgba(255,255,255,0.65)">香港 LGBTQ+ 資料庫</text>

  <!-- Domain -->
  <text x="600" y="860" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', sans-serif" font-size="26" font-weight="500" fill="rgba(255,255,255,0.45)">prism.lgbt</text>
</svg>
